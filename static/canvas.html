            const [nodes, setNodes] = useState([]);
            const [edges, setEdges] = useState([]);
            const [modalImage, setModalImage] = useState(null);
            const reconnectEdge = useRef(null);

            const handlePreview = (url) => {
                setModalImage(url);
            };

            // Refs to prevent stale closure capturing issues in callbacks
            const nodesRef = useRef([]);
            const edgesRef = useRef([]);
            useEffect(() => {
                nodesRef.current = nodes;
            }, [nodes]);
            useEffect(() => {
                edgesRef.current = edges;
            }, [edges]);

            const onNodesChange = useCallback((changes) => {
                setNodes((nds) => applyNodeChanges(changes, nds));
            }, []);

            const onEdgesChange = useCallback((changes) => {
                setEdges((eds) => applyEdgeChanges(changes, eds));
            }, []);

            // Strict connections rules
            const onConnect = useCallback((connection) => {
                const fromNode = nodes.find(n => n.id === connection.source);
                const toNode = nodes.find(n => n.id === connection.target);
                if (!fromNode || !toNode) return;

                // Validate: Prompt -> Image, Prompt -> Video, Image -> Video only
                const fType = fromNode.type;
                const tType = toNode.type;
                const isValid = (fType === 'prompt' && (tType === 'image' || tType === 'video')) ||
                    (fType === 'image' && tType === 'video');

                if (isValid) {
                    setEdges((eds) => addEdge({ ...connection, style: { stroke: '#0ea5e9', strokeWidth: 3 } }, eds));
                    showToast('🔗 노드가 연결되었습니다!');
                } else {
                    showToast('🚫 허용되지 않는 연결입니다. (규칙: Prompt ➔ Image ➔ Video)');
                }
            }, [nodes]);

            // Reconnection Handlers (React Flow Standard)
            const onReconnectStart = useCallback((_, edge) => {
                reconnectEdge.current = edge;
            }, []);

            const onReconnect = useCallback((oldEdge, newConnection) => {
                reconnectEdge.current = null;
                setEdges((els) => els.map(e => e.id === oldEdge.id ? { ...e, ...newConnection } : e));
            }, []);

            const onReconnectEnd = useCallback((_, edge) => {
                if (reconnectEdge.current) {
                    setEdges((eds) => eds.filter((e) => e.id !== reconnectEdge.current.id));
                    reconnectEdge.current = null;
                    showToast('✂️ 연결선이 삭제되었습니다.');
                }
            }, []);

            // Node Property Change Handler (Immutable update to trigger React state refresh)
            const onNodeDataChange = useCallback((nid, field, value) => {
                setNodes((nds) => nds.map((n) => {
                    if (n.id === nid) {
                        return {
                            ...n,
                            data: {
                                ...n.data,
                                [field]: value
                            }
                        };
                    }
                    return n;
                }));
            }, []);

            // ============================================================
            // GRAPH TRAVERSAL UTILITIES
            // ============================================================

            /**
             * Collect ALL upstream nodes of a given type reachable from targetId.
             * Performs BFS traversal across edges.
             */
            const collectUpstreamByType = (targetId, nodeType, visited = new Set()) => {
                if (visited.has(targetId)) return [];
                visited.add(targetId);
                const results = [];
                const incomingEdges = edgesRef.current.filter(e => String(e.target) === String(targetId));
                for (const edge of incomingEdges) {
                    const src = nodesRef.current.find(n => String(n.id) === String(edge.source));
                    if (!src) continue;
                    if (src.type === nodeType) results.push(src);
                    // recurse deeper
                    const deeper = collectUpstreamByType(src.id, nodeType, visited);
                    results.push(...deeper);
                }
                return results;
            };

            /**
             * Get merged upstream context for a node.
             * Returns { promptNode, imageNode } using priority:
             *   1. Directly connected Prompt Node to this node
             *   2. Prompt Node connected through Image Node
             *   3. Directly connected Image Node
             */
            const getUpstreamContext = (targetId) => {
                const incomingEdges = edgesRef.current.filter(e => String(e.target) === String(targetId));
                let promptNode = null;
                let imageNode = null;

                for (const edge of incomingEdges) {
                    const src = nodesRef.current.find(n => String(n.id) === String(edge.source));
                    if (!src) continue;

                    if (src.type === 'prompt' && !promptNode) {
                        promptNode = src;
                    }
                    if (src.type === 'image' && !imageNode) {
                        imageNode = src;
                        // Also look for prompt connected to this image node
                        if (!promptNode) {
                            const imageUpstream = edgesRef.current.filter(e2 => String(e2.target) === String(src.id));
                            for (const e2 of imageUpstream) {
                                const imgSrc = nodesRef.current.find(n => String(n.id) === String(e2.source));
                                if (imgSrc && imgSrc.type === 'prompt') {
                                    promptNode = imgSrc;
                                    break;
                                }
                            }
                        }
                    }
                }

                return { promptNode, imageNode };
            };

            // ============================================================
            // SINGLE NODE EXECUTION — Full Upstream Merge
            // ============================================================
            const onRunSingleNode = useCallback(async (nid) => {
                const node = nodesRef.current.find(n => n.id === nid);
                if (!node) return;

                // Set status → running
                setNodes((nds) => nds.map(n => n.id === nid ? { ...n, data: { ...n.data, status: '생성 중...' } } : n));

                // ── Gather upstream context ──────────────────────────────
                const { promptNode, imageNode } = getUpstreamContext(nid);

                // ── Debug log: upstream summary ─────────────────────────
                console.group(`=== [MotionPix] ${node.type.toUpperCase()} Node [${nid}] Execute ===`);
                console.log('Node data:', node.data);
                console.log('Upstream Prompt Node:', promptNode ? {
                    id: promptNode.id,
                    prompt: promptNode.data.prompt,
                    negativePrompt: promptNode.data.negativePrompt,
                    style: promptNode.data.style,
                    ratio: promptNode.data.ratio
                } : 'NONE (직접 프롬프트 연결 없음)');
                console.log('Upstream Image Node:', imageNode ? {
                    id: imageNode.id,
                    imageUrl: imageNode.data.imageUrl,
                    model: imageNode.data.model,
                    res: imageNode.data.res,
                    status: imageNode.data.status
                } : 'NONE (이미지 노드 연결 없음)');

                // ── Video Node: check missing fields ─────────────────────
                if (node.type === 'video') {
                    const missing = [];
                    if (!promptNode && !node.data.prompt) missing.push('prompt (Prompt Node 연결 없음)');
                    if (imageNode && !imageNode.data.imageUrl && !imageNode.data.inputImage) {
                        missing.push('imageUrl (Image Node가 아직 실행되지 않음 — Image Node를 먼저 실행하세요)');
                    }
                    if (missing.length > 0) {
                        console.warn('[Video Node] 누락된 upstream 값:', missing);
                    }
                    // Log execution mode
                    const hasImage = imageNode && (imageNode.data.imageUrl || imageNode.data.inputImage);
                    const hasPrompt = promptNode || node.data.prompt;
                    if (hasImage && hasPrompt) console.log('▶ 실행 모드: Image-to-Video (prompt + image)');
                    else if (hasImage) console.log('▶ 실행 모드: Image-to-Video (image only)');
                    else console.log('▶ 실행 모드: Text-to-Video (prompt only)');
                }
                console.groupEnd();

                // ── Build merged payload ──────────────────────────────────
                const effectivePrompt = (promptNode?.data?.prompt) || node.data.prompt || 'Cinematic motion';
                const effectiveNegPrompt = (promptNode?.data?.negativePrompt) || node.data.negativePrompt || '';
                const effectiveStyle = (promptNode?.data?.style) || node.data.style || 'Cinematic';
                const effectiveRatio = (promptNode?.data?.ratio) || node.data.ratio || '16:9';

                // Image: prefer imageNode.data.imageUrl (generated), fallback to inputImage (uploaded)
                const effectiveImageUrl = imageNode
                    ? (imageNode.data.imageUrl || imageNode.data.inputImage || null)
                    : null;

                // Get User ID from Supabase SDK
                let userId = null;
                let currentToken = null;
                if (window.supabaseClient) {
                    const { data: { session } } = await window.supabaseClient.auth.getSession();
                    if (session) {
                        userId = session.user?.id || null;
                        currentToken = session.access_token;
                    }
                }

                const finalPayload = {
                    node: {
                        id: node.id,
                        type: node.type,
                        prompt: effectivePrompt,
                        negativePrompt: effectiveNegPrompt,
                        style: effectiveStyle,
                        ratio: effectiveRatio,
                        model: node.data.model,
                        res: node.data.res || (node.type === 'video' ? 'std' : '1k'),
                        dur: node.data.dur || '5',
                        sound: node.data.sound || 'off',
                        inputImage: node.data.inputImage || null,
                        imageUrl: effectiveImageUrl || node.data.imageUrl || null,
                        videoUrl: node.data.videoUrl || null
                    },
                    parent_prompt: promptNode ? {
                        prompt: promptNode.data.prompt,
                        negativePrompt: promptNode.data.negativePrompt,
                        style: promptNode.data.style,
                        ratio: promptNode.data.ratio
                    } : null,
                    parent_image: imageNode ? {
                        imageUrl: imageNode.data.imageUrl || null,
                        inputImage: imageNode.data.inputImage || null,
                        resolution: imageNode.data.res || '1k',
                        model: imageNode.data.model || null
                    } : null,
                    user_id: userId
                };


                console.log('[MotionPix] Final merged payload →', JSON.stringify(finalPayload, null, 2));
                showToast(`🚀 ${node.type.toUpperCase()} 노드 실행 시작...`);

                try {
                    const headers = { 'Content-Type': 'application/json' };
                    if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;

                    const res = await fetch('/api/workflow/node-execute', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(finalPayload)
                    });
                    if (!res.ok) {
                        const errBody = await res.json().catch(() => ({}));
                        throw new Error(errBody.detail || errBody.error || `HTTP ${res.status}`);
                    }
                    const data = await res.json();

                    if (data.status === 'polling') {
                        // Video Node polling logic
                        setNodes((nds) => nds.map(n => n.id === nid ? { ...n, data: { ...n.data, status: '생성 중...' } } : n));
                        const { task_id, task_type, model_name, prompt: full_prompt } = data;
                        
                        let pollInterval = setInterval(async () => {
                            try {
                                const statusRes = await fetch(`/api/kling/task/${task_type}/${task_id}`);
                                if (!statusRes.ok) throw new Error(`Polling API error: ${statusRes.status}`);
                                const statusData = await statusRes.json();
                                const ts = statusData.task_status || statusData.status;
                                
                                if (ts === 'succeed' || ts === 'completed' || ts === 'success') {
                                    clearInterval(pollInterval);
                                    let vUrl = statusData.video_url;
                                    if (!vUrl) {
                                        const taskRes = statusData.raw_response?.data?.task_result;
                                        if (taskRes && taskRes.videos && taskRes.videos.length > 0) {
                                            vUrl = taskRes.videos[0].url;
                                        }
                                    }
                                    
                                    if (vUrl) {
                                        setNodes((nds) => nds.map(n => n.id === nid ? {
                                            ...n, data: { ...n.data, status: '완료', videoUrl: vUrl }
                                        } : n));
                                        showToast(`✅ Video 생성 완료!`);
                                        
                                        // Save to Generations DB
                                        if (userId) {
                                            const payload = {
                                                user_id: userId,
                                                prompt: full_prompt || '',
                                                image_url: vUrl,
                                                model_name: model_name || 'kling-v2.5-turbo',
                                                type: 'video'
                                            };
                                            fetch('/api/generations/save', {
                                                method: 'POST',
                                                headers: { 'Content-Type': 'application/json' },
                                                body: JSON.stringify(payload)
                                            }).catch(err => console.error("DB save error", err));
                                        }
                                    } else {
                                        throw new Error("No video URL returned from Kling API");
                                    }
                                } else if (ts === 'failed') {
                                    clearInterval(pollInterval);
                                    throw new Error(statusData.raw_response?.data?.task_status_msg || "Kling task failed");
                                }
                            } catch (e) {
                                clearInterval(pollInterval);
                                setNodes((nds) => nds.map(n => n.id === nid ? { ...n, data: { ...n.data, status: '실패' } } : n));
                                showToast('❌ ' + e.message);
                            }
                        }, 4000); // 4 second interval
                    } else if (data.status === 'success') {
                        const result = data.result || {};
                        setNodes((nds) => nds.map(n => {
                            if (n.id === nid) {
                                return {
                                    ...n,
                                    data: {
                                        ...n.data,
                                        status: '완료',
                                        imageUrl: result.imageUrl || n.data.imageUrl,
                                        videoUrl: result.videoUrl || n.data.videoUrl
                                    }
                                };
                            }
                            return n;
                        }));
                        console.log(`[MotionPix] ✅ ${node.type.toUpperCase()} 생성 완료:`, result);
                        showToast(`✅ ${node.type.toUpperCase()} 생성 완료!`);
                    } else {
                        const errMsg = data.error || 'API Execution Failed';
                        console.error(`[MotionPix] ❌ ${node.type.toUpperCase()} 실패:`, errMsg);
                        throw new Error(errMsg);
                    }
                } catch (err) {
                    setNodes((nds) => nds.map(n => n.id === nid ? { ...n, data: { ...n.data, status: '실패' } } : n));
                    console.error('[MotionPix] 실행 오류:', err);
                    showToast('❌ 생성 오류: ' + err.message);
                }
            }, [nodes, edges]);

            // Add new nodes
            const addNode = (type) => {
                const id = `n_${Date.now()}`;
                const newNode = {
                    id,
                    type,
                    position: { x: 100 + nodes.length * 40, y: 150 + nodes.length * 20 },
                    data: {
                        prompt: '',
                        negativePrompt: '',
                        style: 'Cinematic',
                        ratio: '16:9',
                        model: type === 'image' ? 'gemini-3.1-flash-image-preview' : 'kling-v3.0',
                        res: '1k',
                        dur: '5',
                        status: '대기',
                        onChange: onNodeDataChange,
                        onRun: onRunSingleNode,
                        onPreview: handlePreview
                    }
                };
                setNodes((nds) => nds.concat(newNode));
                showToast(`✅ 신규 ${type.toUpperCase()} 노드 추가`);
            };

            const loadTemplate = () => {
                const id1 = 'prompt_1';
                const id2 = 'image_1';
                const id3 = 'video_1';

                const initialNodes = [
                    {
                        id: id1,
                        type: 'prompt',
                        position: { x: 50, y: 120 },
                        data: {
                            prompt: '미래 도시 야경 속의 사이버펑크 스타일 레이싱 카',
                            negativePrompt: 'blurry, low quality',
                            style: 'Cyberpunk',
                            ratio: '16:9',
                            status: '대기',
                            onChange: onNodeDataChange,
                            onRun: onRunSingleNode,
                            onPreview: handlePreview
                        }
                    },
                    {
                        id: id2,
                        type: 'image',
                        position: { x: 450, y: 120 },
                        data: {
                            model: 'gemini-3.1-flash-image-preview',
                            res: '1k',
                            status: '대기',
                            onChange: onNodeDataChange,
                            onRun: onRunSingleNode,
                            onPreview: handlePreview
                        }
                    },
                    {
                        id: id3,
                        type: 'video',
                        position: { x: 850, y: 120 },
                        data: {
                            model: 'kling-v3.0',
                            dur: '5',
                            status: '대기',
                            onChange: onNodeDataChange,
                            onRun: onRunSingleNode,
                            onPreview: handlePreview
                        }
                    }
                ];

                const initialEdges = [
                    { id: 'e1', source: id1, target: id2, style: { stroke: '#0ea5e9', strokeWidth: 3 } },
                    { id: 'e2', source: id2, target: id3, style: { stroke: '#0ea5e9', strokeWidth: 3 } }
                ];

                setNodes(initialNodes);
                setEdges(initialEdges);
                showToast('🎬 3단계 워크플로우 템플릿 로드 완료');
            };

            // Run Entire Pipeline
            const runPipeline = async () => {
                if (!nodes.length) return;
                showToast('🚀 전체 파이프라인 순차 실행 시작...');

                // 순차적 순회 실행
                const promptNode = nodes.find(n => n.type === 'prompt');
                const imageNode = nodes.find(n => n.type === 'image');
                const videoNode = nodes.find(n => n.type === 'video');

                if (imageNode) {
                    await onRunSingleNode(imageNode.id);
                }
                // Wait slightly for video trigger state propagation
                setTimeout(async () => {
                    if (videoNode) {
                        await onRunSingleNode(videoNode.id);
                    }
                }, 1500);
            };

            // Canvas Project Save & Load Logic
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [projectTitle, setProjectTitle] = useState('새 캔버스 프로젝트');
            const [showProjectModal, setShowProjectModal] = useState(false);
            const [projectsList, setProjectsList] = useState([]);
            
            const loadProjects = async () => {
                if (!userId) {
                    showToast('로그인이 필요합니다.');
                    return;
                }
                try {
                    const res = await fetch(`/api/canvas/projects?user_id=${userId}`, { cache: 'no-store' });
                    if (!res.ok) throw new Error('Failed to fetch projects');
                    const data = await res.json();
                    if (data.ok) {
                        setProjectsList(data.data || []);
                        setShowProjectModal(true);
                    }
                } catch (e) {
                    console.error(e);
                    showToast('프로젝트 목록을 불러오지 못했습니다.');
                }
            };

            const saveProject = async () => {
                console.log('SAVE BUTTON CLICKED. userId:', userId, 'projectTitle:', projectTitle);
                
                if (!userId) {
                    console.warn('Save aborted: User is not logged in.');
                    alert('로그인이 필요합니다.');
                    showToast('로그인이 필요합니다.');
                    return;
                }
                
                if (!projectTitle.trim()) {
                    console.warn('Save aborted: Project title is empty.');
                    alert('프로젝트 제목을 입력해주세요.');
                    showToast('프로젝트 제목을 입력해주세요.');
                    return;
                }
                
                try {
                    console.log('Sending save request to backend...');
                    const payload = {
                        user_id: userId,
                        project_id: currentProjectId,
                        title: projectTitle,
                        nodes: nodes,
                        edges: edges
                    };
                    const res = await fetch('/api/canvas/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!res.ok) {
                        let errText = await res.text();
                        try {
                            const errJson = JSON.parse(errText);
                            errText = errJson.detail || errText;
                        } catch(e) {}
                        alert('❌ 저장 실패: ' + errText);
                        showToast('❌ 저장 실패: ' + errText);
                        return;
                    }
                    
                    const data = await res.json();
                    if (data.ok && data.data) {
                        setCurrentProjectId(data.data.id);
                        alert(`💾 [${data.data.title}] 저장되었습니다!`);
                        showToast(`💾 [${data.data.title}] 저장되었습니다.`);
                    }
                } catch (e) {
                    console.error(e);
                    alert('❌ 프로젝트 저장 중 오류 발생: ' + e.message);
                    showToast('프로젝트 저장에 실패했습니다.');
                }
            };
            
            const deleteProject = async (id, e) => {
                e.stopPropagation();
                if (!confirm('정말로 이 프로젝트를 삭제하시겠습니까?')) return;
                try {
                    const res = await fetch(`/api/canvas/project/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast('🗑️ 프로젝트가 삭제되었습니다.');
                        loadProjects();
                        if (currentProjectId === id) {
                            setCurrentProjectId(null);
                            setProjectTitle('새 캔버스 프로젝트');
                        }
                    } else {
                        showToast('❌ 삭제 실패');
                    }
                } catch(err) { showToast('❌ 오류 발생'); }
            };

            const updateProjectTitle = async (id, currentTitle, e) => {
                e.stopPropagation();
                const newTitle = prompt('새 프로젝트 이름을 입력하세요:', currentTitle);
                if (!newTitle || newTitle.trim() === '' || newTitle === currentTitle) return;
                try {
                    const res = await fetch(`/api/canvas/project/${id}/title`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: newTitle.trim() })
                    });
                    if (res.ok) {
                        showToast('✅ 이름이 수정되었습니다.');
                        loadProjects();
                        if (currentProjectId === id) setProjectTitle(newTitle.trim());
                    } else {
                        showToast('❌ 수정 실패');
                    }
                } catch(err) { showToast('❌ 오류 발생'); }
            };

            
            const restoreProject = async (projectId) => {
                try {
                    const res = await fetch(`/api/canvas/project/${projectId}`);
                    if (!res.ok) throw new Error('Failed to load project');
                    const data = await res.json();
                    if (data.ok && data.data) {
                        // Restore node onChange / onRun / onPreview bindings
                        const restoredNodes = data.data.nodes.map(n => ({
                            ...n,
                            data: {
                                ...n.data,
                                onChange: onNodeDataChange,
                                onRun: onRunSingleNode,
                                onPreview: handlePreview
                            }
                        }));
                        setNodes(restoredNodes);
                        setEdges(data.data.edges || []);
                        setCurrentProjectId(data.data.id);
                        setProjectTitle(data.data.title);
                        setShowProjectModal(false);
                        showToast(`📂 [${data.data.title}] 불러오기 완료!`);
                    }
                } catch (e) {
                    console.error(e);
                    showToast('프로젝트를 불러오는데 실패했습니다.');
                }
            };

            useEffect(() => {
                const checkAuth = async () => {
                    let attempts = 0;
                    while (!supabaseClient && attempts < 20) {
                        await new Promise(r => setTimeout(r, 100));
                        attempts++;
                    }
                    if (supabaseClient) {
                        const { data: { session } } = await supabaseClient.auth.getSession();
                        if (session && session.user) {
                            setUserId(session.user.id);
                        }
                    }
                };
                checkAuth();

                const urlParams = new URLSearchParams(window.location.search);
                const projectId = urlParams.get('project_id');
                if (projectId) {
                    restoreProject(projectId);
                } else {
                    loadTemplate();
                }
            }, []);

            return (
                <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column' }}>
                    <div className="canvas-control-bar">
                        <div className="top-bar-left">
                            <button className="top-bar-back" onClick={() => history.back()}>← 스튜디오</button>
                            <div style={{ fontSize: '0.9rem', fontWeight: 700, display: 'flex', alignItems: 'center', gap: '12px' }}>
                                <span>MotionPix</span>
                                <div style={{ height: '20px', width: '1px', background: 'rgba(255,255,255,0.2)' }}></div>
                                <input 
                                    type="text" 
                                    value={projectTitle} 
                                    onChange={e => setProjectTitle(e.target.value)} 
                                    style={{ background: 'transparent', border: '1px solid transparent', color: '#f0f0f5', fontSize: '0.9rem', fontWeight: 600, padding: '4px 8px', borderRadius: '4px', outline: 'none', transition: 'border 0.2s', width: '200px' }} 
                                    onFocus={e => e.target.style.border = '1px solid rgba(255,255,255,0.2)'}
                                    onBlur={e => e.target.style.border = '1px solid transparent'}
                                    placeholder="프로젝트 제목 입력..."
                                />
                                <button className="tool-btn" onClick={saveProject} style={{ padding: '6px 12px', background: '#f59e0b', color: '#000', width: 'auto', border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 600, fontSize: '0.8rem' }}>💾 저장</button>
                                <button className="tool-btn" onClick={loadProjects} style={{ padding: '6px 12px', background: '#3f3f46', color: '#fff', width: 'auto', border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: 600, fontSize: '0.8rem' }}>📂 프로젝트 목록</button>
                            </div>
                        </div>
                        <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                            <div className="rule-badge" style={{ marginLeft: '12px' }}>
                                💡 노드/연결선 클릭 후 Delete / Backspace 키로 즉시 삭제 가능
                            </div>
                        </div>
                    </div>

                    <div style={{ flex: 1, position: 'relative' }}>
                        <ReactFlow
                            nodes={nodes}
                            edges={edges}
                            onNodesChange={onNodesChange}
                            onEdgesChange={onEdgesChange}
                            onConnect={onConnect}
                            onReconnect={onReconnect}
                            onReconnectStart={onReconnectStart}
                            onReconnectEnd={onReconnectEnd}
                            nodeTypes={nodeTypes}
                            deleteKeyCode={['Backspace', 'Delete']}
                            fitView
                        >
                            <Controls />
                        </ReactFlow>

                        {/* Toolbar */}
                        <div className="left-bar">
                            <button className="tool-btn" onClick={() => addNode('prompt')} title="Prompt 추가">Prompt</button>
                            <button className="tool-btn" onClick={() => addNode('image')} title="Image 추가">Image</button>
                            <button className="tool-btn" onClick={() => addNode('video')} title="Video 추가">Video</button>
                            <div className="tool-sep"></div>
                            <button className="tool-btn" onClick={loadTemplate}>템플릿</button>
                            <button className="tool-btn" onClick={() => { setNodes([]); setEdges([]); }}>비우기</button>
                        </div>

                        {/* Top Right run pipeline */}
                        <button
                            className="run-btn"
                            style={{ position: 'absolute', bottom: '24px', left: '50%', transform: 'translateX(-50%)', zIndex: 100 }}
                            onClick={runPipeline}
                        >
                            ▶ 전체 파이프라인 순차 실행
                        </button>
                    </div>

                    {/* Image Lightbox Modal */}
                    {modalImage && (
                        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.88)', backdropFilter: 'blur(8px)', zIndex: 10000, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px' }} onClick={() => setModalImage(null)}>
                            <div style={{ position: 'relative', maxWidth: '90vw', maxHeight: '85vh', display: 'flex', flexDirection: 'column', alignItems: 'center' }} onClick={(e) => e.stopPropagation()}>
                                <img src={modalImage} alt="Enlarged Preview" style={{ maxWidth: '100%', maxHeight: '78vh', borderRadius: '12px', boxShadow: '0 20px 50px rgba(0,0,0,0.9)', objectFit: 'contain', border: '1px solid rgba(255,255,255,0.1)' }} />
                                <div style={{ marginTop: '16px', display: 'flex', gap: '12px' }}>
                                    <a href={`/api/download/proxy?url=${encodeURIComponent(modalImage)}&filename=motionpix-large-${Date.now()}.jpg`} style={{ background: '#10b981', color: '#fff', padding: '10px 20px', borderRadius: '8px', textDecoration: 'none', fontWeight: 600, fontSize: '0.9rem', display: 'flex', alignItems: 'center', gap: '6px' }}>
                                        💾 고화질 다운로드
                                    </a>
                                    <button onClick={() => setModalImage(null)} style={{ background: '#3f3f46', color: '#fff', border: 'none', padding: '10px 20px', borderRadius: '8px', fontWeight: 600, fontSize: '0.9rem', cursor: 'pointer' }}>
                                        닫기 ✕
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Project List Modal */}
                    {showProjectModal && (
                        <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0, 0, 0, 0.7)', backdropFilter: 'blur(4px)', zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={() => setShowProjectModal(false)}>
                            <div style={{ width: '400px', background: '#1c1e2a', border: '1px solid rgba(255,255,255,0.1)', borderRadius: '12px', padding: '24px', display: 'flex', flexDirection: 'column' }} onClick={e => e.stopPropagation()}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                                    <h3 style={{ margin: 0, color: '#f0f0f5', fontSize: '1.2rem' }}>내 캔버스 프로젝트</h3>
                                    <button onClick={() => setShowProjectModal(false)} style={{ background: 'transparent', border: 'none', color: '#a1a1aa', cursor: 'pointer', fontSize: '1.2rem' }}>✕</button>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '300px', overflowY: 'auto' }}>
                                    {projectsList.length === 0 ? (
                                        <div style={{ padding: '20px', textAlign: 'center', color: '#71717a' }}>저장된 프로젝트가 없습니다.</div>
                                    ) : (
                                        projectsList.map(proj => (
                                            <div key={proj.id} onClick={() => restoreProject(proj.id)} style={{ padding: '12px', background: '#272a38', borderRadius: '8px', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', border: '1px solid transparent' }} onMouseEnter={e => e.currentTarget.style.borderColor = '#6366f1'} onMouseLeave={e => e.currentTarget.style.borderColor = 'transparent'}>
                                                <div style={{ display: 'flex', flexDirection: 'column' }}>
                                                    <span style={{ color: '#e4e4e7', fontWeight: 600 }}>{proj.title}</span>
                                                    <span style={{ color: '#71717a', fontSize: '0.7rem' }}>{new Date(proj.updated_at).toLocaleDateString()}</span>
                                                </div>
                                                <div style={{ display: 'flex', gap: '8px' }}>
                                                    <button onClick={(e) => updateProjectTitle(proj.id, proj.title, e)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.1rem' }} title="이름 수정">✏️</button>
                                                    <button onClick={(e) => deleteProject(proj.id, e)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '1.1rem' }} title="삭제">🗑️</button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    

})();




</script>
</body>
</html>
